name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "e.g. 1.0.1"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Node.js (ESM)
        - Node.js (CJS)
        - Browser (ESM)
        - Browser (iife / CDN)
        - Bun
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A short code snippet or repo link that reproduces the issue
      render: typescript
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Runtime version, OS, tsconfig, etc.
